<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meowfont 🐱</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --text:#b83280;        /* ชมพูเข้มแบบในภาพ */
  --textl:#d946ef;       /* ชมพูม่วงอ่อน */
  --pink:#f9a8d4;        /* เส้นขอบชมพู */
  --pink2:#ec4899;       /* หัวข้อชมพู */
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Mitr',sans-serif;
  background: linear-gradient(160deg,#ffe8f0 0%,#f5e8ff 40%,#e8f5ff 70%,#fffbe8 100%);
  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
}

/* ================== HEADER ================== */

.shop-name{
  font-size:1.8rem;
  font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(90deg,#c084fc,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.shop-sub{
  font-size:.82rem;
  color:var(--textl);
  margin-top:6px;
  line-height:1.6;
}

/* ================== CARD TITLE ================== */

.ct{
  font-size:.98rem;
  font-weight:600;
  color:var(--pink2);
  margin-bottom:13px;
  display:flex;
  align-items:center;
  gap:8px;
}

/* ================== STATUS ================== */

.s-open{
  font-size:1.1rem;
  font-weight:600;
  color:var(--pink2);
}

/* ================== TEXT ELEMENTS ================== */

.st{ color:var(--text); }

.lnk{
  color:var(--text);
}

.lnk-name{
  font-weight:500;
  font-size:.88rem;
  color:var(--pink2);
}

.lnk-url{
  font-size:.72rem;
  color:var(--textl);
}

.tag{
  color:var(--text);
}

.pay-pill{
  color:var(--text);
}

.note{
  color:var(--text);
}

.footer{
  color:var(--textl);
}

.soc{
  color:var(--text);
}

.cta-btn{
  font-family:'Mitr',sans-serif;
}

</style>
</head>
<body>

<!-- เนื้อหาของมึงทั้งหมดใช้ของเดิมได้เลย ไม่ต้องแก้อะไร -->

</body>
</html>
